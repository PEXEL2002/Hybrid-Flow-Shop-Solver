[pytest]
# Konfiguracja pytest dla projektu HFS-SDST

# Gdzie szukać testów
testpaths = tests

# Wzorce nazw plików testowych
python_files = test_*.py

# Wzorce nazw klas testowych
python_classes = Test*

# Wzorce nazw funkcji testowych
python_functions = test_*

# Opcje domyślne dla pytest
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Definicje markerów
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests

# Ścieżki do ignorowania
norecursedirs = .git .tox dist build *.egg __pycache__

# Minimalna wersja pytest
minversion = 7.0
